name: Sync Copilot Agents

on:
  push:
    branches: [ 'agents-sync' ]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent files
        run: |
          set -euo pipefail
          files=$(git ls-files '.copilot/agents/**' || true)
          if [ -z "$files" ]; then
            echo "No agent files found under .copilot/agents"; exit 1
          fi
          for f in $files; do
            if ! grep -q '^name:' "$f"; then echo "Missing 'name:' in $f"; exit 1; fi
            if ! grep -q '^description:' "$f"; then echo "Missing 'description:' in $f"; exit 1; fi
          done

  create-pr:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request to main
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync copilot agents from agents-sync\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          branch: agents-sync
          base: main
          title: "Sync: Copilot agents"
          body: |
            Automated sync of Copilot agent definitions from the agents-sync branch.
